<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Android Recorder Monitor</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #232633;
    --border: #2e3347; --text: #e4e7f1; --text2: #8b90a5;
    --accent: #6c72cb; --green: #34d399; --red: #f87171;
    --yellow: #fbbf24; --blue: #60a5fa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Fira Code', monospace; background: var(--bg); color: var(--text); font-size: 13px; }

  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header h1 span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  .live-dot.stopped { background: var(--red); animation: none; }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.3 } }
  .status-text { font-size: 12px; color: var(--text2); }
  .back-link { color: var(--accent); text-decoration: none; font-size: 12px; }

  .container { padding: 16px 24px; display: flex; gap: 16px; height: calc(100vh - 52px); }

  /* Left: session list */
  .session-list {
    width: 220px; min-width: 220px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px; overflow-y: auto;
  }
  .session-list-header { padding: 10px 14px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 12px; color: var(--text2); }
  .session-item {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.2s;
  }
  .session-item:hover { background: var(--surface2); }
  .session-item.active { background: var(--accent)22; border-left: 3px solid var(--accent); }
  .session-item .name { font-size: 11px; font-weight: 600; }
  .session-item .meta { font-size: 10px; color: var(--text2); margin-top: 3px; }
  .session-item .recording-badge { color: var(--green); font-size: 10px; font-weight: 600; }

  /* Center: screenshot timeline */
  .timeline {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow-y: auto; padding: 16px;
  }
  .timeline-header { font-weight: 600; font-size: 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .event-count { font-size: 12px; color: var(--text2); }

  .step-card {
    display: flex; gap: 16px; margin-bottom: 20px; padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .step-card:last-child { border-bottom: none; }

  .step-number {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent)33; color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; flex-shrink: 0;
  }
  .step-number.initial { background: var(--blue)33; color: var(--blue); }

  .step-content { flex: 1; min-width: 0; }
  .step-meta { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
  .step-meta .coord { color: var(--yellow); font-weight: 600; }

  .screenshot-container { position: relative; display: inline-block; max-width: 100%; }
  .screenshot-container img {
    max-height: 500px; border-radius: 8px; border: 1px solid var(--border);
    display: block;
  }
  .tap-marker {
    position: absolute; width: 24px; height: 24px;
    border: 3px solid var(--red); border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 0 4px rgba(248, 113, 113, 0.3);
    pointer-events: none;
  }
  .tap-marker::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    width: 6px; height: 6px; background: var(--red);
    border-radius: 50%; transform: translate(-50%, -50%);
  }

  .element-info {
    margin-top: 8px; padding: 8px 12px;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    font-size: 12px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
  }
  .element-info .el-label { color: var(--text2); font-size: 10px; }
  .element-info .el-text { color: var(--green); font-weight: 600; }
  .element-info .el-id { color: var(--blue); }
  .element-info .el-desc { color: var(--yellow); }
  .element-info .el-class { color: var(--text2); }
  .element-info .el-unknown { color: var(--text2); font-style: italic; }

  .no-screenshot { color: var(--text2); font-style: italic; font-size: 12px; padding: 20px 0; }
  .empty-state { color: var(--text2); text-align: center; padding: 60px 20px; }
  .empty-state h2 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
</style>
</head>
<body>

<div class="header">
  <h1><span>Android</span> Recorder Monitor</h1>
  <div class="header-right">
    <div class="live-dot" id="liveDot"></div>
    <span class="status-text" id="statusText">Loading...</span>
    <a href="/" class="back-link">← Dashboard</a>
  </div>
</div>

<div class="container">
  <div class="session-list">
    <div class="session-list-header">Sessions</div>
    <div id="sessionListContent"></div>
  </div>
  <div class="timeline" id="timeline">
    <div class="empty-state">
      <h2>No session selected</h2>
      <p>Select a session from the left, or start the recorder:</p>
      <p style="margin-top:8px;color:var(--accent)">npx tsx src/tests/android-recorder.mjs</p>
    </div>
  </div>
</div>

<script>
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
let currentSession = null;
let pollTimer = null;
let lastEventCount = -1;

async function loadSessions() {
  try {
    const res = await fetch('/api/recordings');
    const sessions = await res.json();
    renderSessionList(sessions);
    // Auto-select first (newest) session
    if (sessions.length > 0 && !currentSession) {
      selectSession(sessions[0].name);
    }
  } catch (e) {
    console.error('Failed to load sessions:', e);
  }
}

function renderSessionList(sessions) {
  const el = document.getElementById('sessionListContent');
  if (sessions.length === 0) {
    el.innerHTML = '<div style="padding:16px;color:var(--text2);font-size:11px">No recordings yet</div>';
    return;
  }
  el.innerHTML = sessions.map(s => {
    const session = s.session;
    const isActive = s.name === currentSession;
    const isRecording = session?.recording;
    return `<div class="session-item${isActive ? ' active' : ''}" onclick="selectSession('${s.name}')">
      <div class="name">${isRecording ? '<span class="recording-badge">● REC</span> ' : ''}${s.name.replace('session-', '').slice(0,10)}</div>
      <div class="meta">${session?.eventCount ?? 0} taps · ${session?.deviceId ?? '?'}</div>
    </div>`;
  }).join('');
}

async function selectSession(name) {
  currentSession = name;
  lastEventCount = -1;
  await loadSessionData();
  startPolling();
  loadSessions(); // refresh list to highlight active
}

async function loadSessionData() {
  if (!currentSession) return;
  try {
    const res = await fetch(`/api/recording?session=${currentSession}`);
    const session = await res.json();
    renderTimeline(session);
    updateStatus(session);
  } catch (e) {
    console.error('Failed to load session:', e);
  }
}

function updateStatus(session) {
  const dot = document.getElementById('liveDot');
  const text = document.getElementById('statusText');
  if (session.recording) {
    dot.className = 'live-dot';
    text.textContent = `Recording · ${session.eventCount} taps`;
  } else {
    dot.className = 'live-dot stopped';
    text.textContent = `Stopped · ${session.eventCount} taps`;
  }
}

function renderTimeline(session) {
  const el = document.getElementById('timeline');
  if (session.eventCount === lastEventCount) return; // skip redundant renders
  lastEventCount = session.eventCount;

  const events = session.events || [];
  const screenW = session.screenSize?.width || 1140;
  const screenH = session.screenSize?.height || 2616;

  let html = `<div class="timeline-header">
    <span>Session: ${session.sessionName || currentSession}</span>
    <span class="event-count">${events.length} tap(s)</span>
  </div>`;

  // Initial screenshot (index 0, before any tap)
  const initialImg = `000-initial.png`;
  html += `<div class="step-card">
    <div class="step-number initial">0</div>
    <div class="step-content">
      <div class="step-meta">Initial screen · ${session.startTime?.substring(11, 19) || ''}</div>
      <div class="screenshot-container">
        <img src="/recordings/${currentSession}/${initialImg}" onerror="this.style.display='none'" />
      </div>
    </div>
  </div>`;

  for (const event of events) {
    const idx = event.index + 1;
    const time = event.time?.substring(11, 19) || '';
    const hasScreenshot = !!event.screenshot;

    html += `<div class="step-card">
      <div class="step-number">${idx}</div>
      <div class="step-content">
        <div class="step-meta">
          Tap <span class="coord">(${event.screenX}, ${event.screenY})</span> · ${time}
        </div>`;

    if (hasScreenshot) {
      // Calculate marker position as percentage of image
      const pctX = ((event.screenX / screenW) * 100).toFixed(2);
      const pctY = ((event.screenY / screenH) * 100).toFixed(2);

      html += `<div class="screenshot-container">
          <img src="/recordings/${currentSession}/${event.screenshot}?t=${Date.now()}" onload="this.parentElement.style.display='inline-block'" onerror="this.style.display='none'" />
          <div class="tap-marker" style="left:${pctX}%;top:${pctY}%"></div>
        </div>`;
    } else {
      html += `<div class="no-screenshot">Screenshot pending...</div>`;
    }

    // Element info
    if (event.element) {
      const e = event.element;
      let elHtml = '<div class="element-info">';
      if (e.text) elHtml += `<span><span class="el-label">text</span> <span class="el-text">"${escHtml(e.text)}"</span></span>`;
      if (e.contentDesc) elHtml += `<span><span class="el-label">desc</span> <span class="el-desc">[${escHtml(e.contentDesc)}]</span></span>`;
      if (e.resourceId) elHtml += `<span><span class="el-label">id</span> <span class="el-id">#${escHtml(e.resourceId)}</span></span>`;
      if (e.className) elHtml += `<span class="el-class">${escHtml(e.className)}</span>`;
      if (e.clickable) elHtml += `<span style="color:var(--green)">clickable</span>`;
      elHtml += '</div>';
      html += elHtml;
    } else if (event.description && event.description !== 'identifying...') {
      html += `<div class="element-info"><span class="el-unknown">${escHtml(event.description)}</span></div>`;
    } else if (event.description === 'identifying...') {
      html += `<div class="element-info"><span class="el-unknown">Identifying element...</span></div>`;
    }

    html += `</div></div>`;
  }

  el.innerHTML = html;
  // Auto-scroll to bottom for live recording
  if (session.recording) {
    el.scrollTop = el.scrollHeight;
  }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(() => {
    loadSessionData();
    loadSessions();
  }, 2000);
}

// Initial load
loadSessions();
startPolling();
</script>
</body>
</html>
